name: dolphin-emulator-kyu
base: core24
version: '2506a'
platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
summary: GameCube / Wii / Triforce Emulator
description: |
  Dolphin is an emulator for two recent Nintendo video game consoles: the GameCube and the Wii. It allows PC gamers to enjoy games for these two consoles in full HD (1080p) with several enhancements: compatibility with all PC controllers, turbo speed, networked multiplayer, and even more!
grade: stable
confinement: strict

apps:
  dolphin-emulator-kyu:
    command-chain:
      - snap/command-chain/gpu-2404-wrapper
      - snap/command-chain/desktop-launch6
    command: usr/games/dolphin-emu
    desktop: usr/local/share/applications/dolphin-emu.desktop
    common-id: org.DolphinEmu.dolphin-emu
    environment:
      QT_QPA_PLATFORM: xcb
      GTK_USE_PORTAL: "1"
      QT_VERSION: "6"
      LD_LIBRARY_PATH: $SNAP/gpu-2404/usr/lib/x86_64-linux-gnu:$SNAP/usr/lib/x86_64-linux-gnu:$SNAP/usr/lib/x86_64-linux-gnu/pulseaudio${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
      LIBGL_DRIVERS_PATH: $SNAP/gpu-2404/usr/lib/x86_64-linux-gnu/dri:${LIBGL_DRIVERS_PATH:+:$LIBGL_DRIVERS_PATH}
    plugs:
      - desktop
      - desktop-legacy
      - unity7
      - opengl
      - wayland
      - x11
      - screen-inhibit-control
      - audio-playback
      - network
      - network-bind
      - home
      - removable-media
      - mount-observe
      - joystick
      - bluez
      - hardware-observe
      - optical-drive
      - raw-usb
      - hidraw

hooks:
  configure:
    command-chain:
      - snap/command-chain/hooks-configure-desktop

package-repositories:
  - type: apt
    url: http://origin.archive.neon.kde.org/user
    suites: [noble]
    components: [main]
    architectures: [amd64]
    key-id: 444DABCF3667D0283F894EDDE6D4736255751E5D

plugs:
  desktop:
    mount-host-font-cache: false
  gtk-2-themes:
    interface: content
    target: $SNAP/data-dir/themes
    default-provider: gtk-common-themes
  gtk-3-themes:
    interface: content
    target: $SNAP/data-dir/themes
    default-provider: gtk-common-themes
  icon-themes:
    interface: content
    target: $SNAP/data-dir/icons
    default-provider: gtk-common-themes
  sound-themes:
    interface: content
    target: $SNAP/data-dir/sounds
    default-provider: gtk-common-themes
  gpu-2404:
    interface: content
    target: $SNAP/gpu-2404
    default-provider: mesa-2404
  shared-memory:
    private: true

parts:
  dolphin-emu:
    plugin: cmake
    source: https://github.com/dolphin-emu/dolphin.git
    source-tag: 2506a
    build-packages:
      - gettext
      - build-essential
      - libavcodec-dev
      - libavformat-dev
      - libavutil-dev
      - libswscale-dev
      - libevdev-dev
      - libusb-1.0-0-dev
      - libxrandr-dev
      - libxi-dev
      - libpangocairo-1.0-0
      - qt6-base-private-dev
      - qt6-svg-dev
      - libqt6svgwidgets6
      - libbluetooth-dev
      - libasound2-dev
      - libpulse-dev
      - libgl1-mesa-dev
      - libcurl4-openssl-dev
      - libudev-dev
      - libsystemd-dev
      - libsdl2-dev
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_ALSA=OFF
      - -DENABLE_SDL=ON
      - -DENABLE_EVDEV=ON
      - -DDISTRIBUTOR=Kyuyrii
      - -DCMAKE_INSTALL_BINDIR=/usr/games
      - -DCMAKE_INSTALL_DATADIR=/usr/share/games
    override-build: |
      craftctl default
      sed -e 's|Exec=dolphin-emu|Exec=${SNAP}/usr/games/dolphin-emu|' -i  $CRAFT_PART_INSTALL/usr/local/share/applications/dolphin-emu.desktop
      sed -e 's|Icon=dolphin-emu|Icon=${SNAP}/usr/local/share/icons/hicolor/scalable/apps/dolphin-emu.svg|' -i  $CRAFT_PART_INSTALL/usr/local/share/applications/dolphin-emu.desktop

  command-chain:
    after: [dependencies]
    plugin: nil
    source: ./launcher
    override-build: |
      mkdir -p $CRAFT_PART_INSTALL/snap
      cp -r command-chain $CRAFT_PART_INSTALL/snap/
      chmod 777 $CRAFT_PART_INSTALL/snap/command-chain/*

  dependencies:
    after: [dolphin-emu]
    plugin: nil
    stage-packages:
      - libbluetooth3
      - libcubeb0
      - libenet7
      - libhidapi-hidraw0
      - libmgba0.10t64
      - libminiupnpc17
      - libpugixml1v5
      - libsdl2-2.0-0
      - libsfml-network2.6
      - libsfml-system2.6
      - libspng0
      - libtinygltf5d
      - xdg-utils
      - libcurl4t64
      - libusb-1.0-0
      - libqt6widgets6
      - kde-style-breeze

  fonts:
    after: [dolphin-emu]
    plugin: nil
    stage-packages:
      - fonts-dejavu-core
      - fonts-hack
      - fonts-noto-cjk
      - fonts-noto-hinted
      - fonts-noto-unhinted
      - fonts-tlwg-sawasdee-ttf
      - fonts-dejavu-mono
      - fonts-liberation
      - fonts-noto-color-emoji
      - fonts-noto-mono
      - fonts-opensymbol
      - fonts-ubuntu
      - fonts-droid-fallback
      - fonts-liberation-sans-narrow
      - fonts-noto-core
      - fonts-noto-ui-core
      - fonts-tlwg-sawasdee
      - fonts-urw-base35

layout:
  /usr/share/libdrm:
    bind: $SNAP/gpu-2404/libdrm
  /usr/share/drirc.d:
    symlink: $SNAP/gpu-2404/drirc.d
  /usr/share/games/dolphin-emu/sys:
    symlink: $SNAP/usr/share/games/dolphin-emu/sys
  /usr/share/games/locale:
    bind: $SNAP/usr/local/share/locale
  /etc/fonts:
    bind: $SNAP/etc/fonts
